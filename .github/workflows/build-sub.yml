name: Build Subscription

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download multiple external sub files
        run: |
          mkdir -p configs
          
          mapfile -t urls < <(grep -oE 'https?://[^"]+' cleaned_sub_links.txt)
          
          counter=1
          for url in "${urls[@]}"; do
            filename="configs/external_${counter}.txt"
            
            curl -sL --fail "$url" -o "$filename" || {
              echo "Failed to download: $url"
              continue
            }
            
            echo "Downloaded $url -> $filename, lines: $(wc -l < "$filename")"
            ((counter++))
          done

      - name: Merge and deduplicate configs
        run: |
          echo "=== DEBUG: List all files in configs before sorting ==="
          ls -la configs/
          echo ""
          
          > sub.txt
          
          personal_files=()
          for f in configs/*.txt; do
            if [[ ! "$f" =~ external_[0-9]+\.txt$ ]]; then
              personal_files+=("$f")
            fi
          done
          
          if [ ${#personal_files[@]} -eq 0 ]; then
            echo "No personal files found."
          else
            echo "=== Getting last commit timestamp for each personal file ==="
            tmp_file=$(mktemp)
            for f in "${personal_files[@]}"; do
              ts=$(git log -1 --format='%ct' -- "$f" 2>/dev/null || echo 0)
              echo "$ts|$f"
              echo "$ts|$f" >> "$tmp_file"
            done
            echo ""
            
            echo "=== Adding personal files in sorted order ==="
            sort -t'|' -k1 -rn "$tmp_file" | cut -d'|' -f2 > sorted_files.txt
            while IFS= read -r file; do
              echo "  Adding $file"
              cat "$file" >> sub.txt
            done < sorted_files.txt
          fi
          
          echo "=== Adding external files ==="
          for f in configs/external_*.txt; do
            if [ -f "$f" ]; then
              echo "  Adding $f"
              cat "$f" >> sub.txt
            fi
          done
          
          # حذف خطوط تکراری و خالی
          echo "=== Removing duplicates and empty lines ==="
          sort -u sub.txt | grep -v '^$' > sub_unique.txt
          mv sub_unique.txt sub.txt
          
          # محدود کردن تعداد خطوط (اختیاری - مثلاً 5000 خط اول)
          # head -n 5000 sub.txt > sub_temp.txt
          # mv sub_temp.txt sub.txt
          
          if [ ! -s sub.txt ]; then
            echo "# No configs found" > sub.txt
          fi
          
          echo "=== Total lines in sub.txt: $(wc -l < sub.txt) ==="
          echo "=== File size: $(du -h sub.txt | cut -f1) ==="

      - name: Compress to gzip (smaller than base64)
        run: |
          # گزینه 1: فشرده‌سازی با gzip
          gzip -c sub.txt > subscribe.txt.gz
          
          # گزینه 2: اگر باز هم base64 می‌خواهید ولی فشرده
          gzip -c sub.txt | base64 -w 0 > subscribe_base64.txt
          
          # نمایش حجم فایل‌ها
          echo "=== Original: $(du -h sub.txt | cut -f1)"
          echo "=== Gzipped: $(du -h subscribe.txt.gz | cut -f1)"
          echo "=== Gzipped+Base64: $(du -h subscribe_base64.txt | cut -f1)"

      - name: Split into multiple files (if still too large)
        run: |
          # تقسیم فایل به چند قسمت 50 مگابایتی
          split -b 50m -d sub.txt subscribe_part_
          
          # یا تقسیم بر اساس خطوط
          # split -l 10000 sub.txt subscribe_part_
          
          ls -lh subscribe_part_*

      - name: Commit and push (with compression)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # حذف فایل قبلی subscribe.txt اگر هست
          git rm --ignore-unmatch subscribe.txt
          
          # اضافه کردن فایل فشرده شده
          git add subscribe.txt.gz
          # یا git add subscribe_base64.txt
          # یا git add subscribe_part_*
          
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update subscription (compressed)"
            git pull --rebase origin main
            git push
          fi
