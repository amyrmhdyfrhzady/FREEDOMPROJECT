name: Build Subscription

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'
env:
  MAX_EXTERNAL: 550
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download multiple external sub files
        run: |
          mkdir -p configs
          urls=(
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Sub1.txt"
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Sub2.txt"
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Sub3.txt"
            "https://raw.githubusercontent.com/mermeroo/Loon/main/node"
            "https://raw.githubusercontent.com/mermeroo/Loon/main/node%202"
            "https://raw.githubusercontent.com/mermeroo/QX/refs/heads/main/Nodes"
            "https://raw.githubusercontent.com/mermeroo/Loon/refs/heads/main/all.nodes.txt"
            "https://raw.githubusercontent.com/mermeroo/QuantumultX/refs/heads/main/Trojan.nodes"
            "https://raw.githubusercontent.com/personqianduixue/SubCrawler/main/sub/share/all"
            "https://raw.githubusercontent.com/w1770946466/Auto_proxy/main/Long_term_subscription_num"
            "https://raw.githubusercontent.com/mahdibland/ShadowsocksAggregator/master/sub/sub_merge.txt"
            "https://raw.githubusercontent.com/mahdibland/V2RayAggregator/master/sub/sub_merge.txt"
            "https://raw.githubusercontent.com/gtang8/SubCrawler/main/sub/share/all"
            "https://raw.githubusercontent.com/zzz6839/SubCrawler/main/sub/share/all"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/yudou66.txt"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/wenode.txt"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/nodefree.txt"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/nodev2ray.txt"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/ndnode.txt"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/clashmeta.txt"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/v2rayshare.txt"
            "https://raw.githubusercontent.com/resasanian/Mirza/main/mirza-all.txt"
            "https://raw.githubusercontent.com/resasanian/Mirza/main/mirza-ss.txt"
            "https://raw.githubusercontent.com/resasanian/Mirza/main/mirza-ssr.txt"
            "https://raw.githubusercontent.com/resasanian/Mirza/main/mirza-vmess.txt"
            "https://raw.githubusercontent.com/resasanian/Mirza/main/mirza-vless.txt"
            "https://raw.githubusercontent.com/resasanian/Mirza/main/mirza-trojan.txt"
            "https://raw.githubusercontent.com/resasanian/Mirza/main/sub"
            "https://raw.githubusercontent.com/zjfb/SubCrawler/main/sub/share/all"
            "https://raw.githubusercontent.com/QQnight/SubCrawler/main/sub/share/all"
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Sub4.txt"
          )
          counter=1
          for url in "${urls[@]}"; do
            filename="configs/external_${counter}.txt"
            curl -sL "$url" -o "$filename"
            echo "Downloaded $url -> $filename, lines: $(wc -l < "$filename")"
            ((counter++))
          done

      - name: Merge all configs (personal unlimited, sorted by commit time)
        run: |
          echo "=== DEBUG: List all files in configs ==="
          ls -la configs/
          echo ""
          
          > sub.txt
          
          # ============================================
          # 1. فایل‌های شخصی (غیر external)
          # ============================================
          personal_files=()
          for f in configs/*.txt; do
            if [[ ! "$f" =~ external_[0-9]+\.txt$ ]]; then
              personal_files+=("$f")
            fi
          done
          
          if [ ${#personal_files[@]} -eq 0 ]; then
            echo "No personal files found."
          else
            echo "=== Getting last commit timestamp for personal files ==="
            tmp_file=$(mktemp)
            for f in "${personal_files[@]}"; do
              ts=$(git log -1 --format='%ct' -- "$f" 2>/dev/null || echo 0)
              echo "$ts|$f" >> "$tmp_file"
            done
            
            echo "=== Sorted by timestamp (newest first) ==="
            sort -t'|' -k1 -rn "$tmp_file" | while IFS='|' read -r ts file; do
              date_str=$(date -d "@$ts" '+%Y-%m-%d %H:%M:%S' 2>/dev/null || echo "unknown")
              echo "$ts -> $file ($date_str)"
            done
            echo ""
            
            echo "=== Adding personal files in sorted order (all, unlimited) ==="
            sort -t'|' -k1 -rn "$tmp_file" | cut -d'|' -f2 > sorted_personal.txt
            while IFS= read -r file; do
              echo "  Adding $file"
              grep -E "^(vmess|vless|trojan|ss|ssr|tuic|hysteria2|socks)://" "$file" >> sub.txt 2>/dev/null || true
            done < sorted_personal.txt
          fi
          
          # ============================================
          # 2. فایل‌های خارجی (با محدودیت)
          # ============================================
          echo "=== Collecting external configs ==="
          > external_all.txt
          for f in configs/external_*.txt; do
            if [ -f "$f" ]; then
              grep -E "^(vmess|vless|trojan|ss|ssr|tuic|hysteria2|socks)://" "$f" >> external_all.txt 2>/dev/null || true
            fi
          done
          
          ext_total=$(wc -l < external_all.txt)
          echo "Total external valid lines: $ext_total"
          
          if [ "$ext_total" -gt "$MAX_EXTERNAL" ]; then
            echo "Limiting external configs to $MAX_EXTERNAL random lines."
            shuf external_all.txt | head -n "$MAX_EXTERNAL" >> sub.txt
          else
            echo "Adding all external configs (no limit needed)."
            cat external_all.txt >> sub.txt
          fi
          
          # ============================================
          # 3. نهایی سازی
          # ============================================
          if [ ! -s sub.txt ]; then
            echo "# No configs found" > sub.txt
          fi
          
          echo "=== Final total lines in sub.txt: $(wc -l < sub.txt) ==="

      - name: Convert to base64
        run: |
          base64 -w 0 sub.txt > subscribe.txt

      - name: Commit and push (FIXED - no error on first run)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
    
          # ساخت subscribe.txt
          base64 -w 0 sub.txt > subscribe.txt
          echo "$(date +'%Y-%m-%d %H:%M:%S UTC') - Cron triggered" > .timestamp
        
          git add -f subscribe.txt .timestamp
          
          # بررسی تغییرات و commit در صورت نیاز
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update subscription $(date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main --no-edit || true
            git push
          fi
