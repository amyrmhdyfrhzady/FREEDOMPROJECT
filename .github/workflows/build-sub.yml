name: Build Subscription

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download external sub files
        run: |
          mkdir -p configs
          urls=(
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Sub1.txt"
            "https://vip.xoomail.us/sub/dGVzdDIzMzgyNjA3LDE3ODAwMzk4ODAXPu2XBMWvZ"
          )
          counter=1
          for url in "${urls[@]}"; do
            curl -sL "$url" -o "configs/external_${counter}.txt"
            ((counter++))
          done

      - name: Merge and filter
        run: |
          > sub.txt
          for f in configs/*.txt; do
            grep -E "^(vmess|vless|trojan|ss|ssr|tuic|hysteria2|socks)://" "$f" >> sub.txt 2>/dev/null || true
          done
          [ -s sub.txt ] || echo "# No valid configs" > sub.txt

      - name: Create and force commit subscribe.txt
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # ساخت subscribe.txt
          base64 -w 0 sub.txt > subscribe.txt
          date > .last_update
          
          # حذف و اضافه اجباری
          git rm -f subscribe.txt .last_update 2>/dev/null || true
          git add -f subscribe.txt .last_update
          
          # کامیت و push
          git commit -m "Update $(date +'%H:%M')" && git push -f || echo "No push needed"
